# docker-compose.example.yml — Stream Lazarus v2
#
# Add the stream-lazarus service to your existing docker-compose.yml
# (alongside your SillyTavern and Nginx Proxy Manager services).
#
# ── What to do ────────────────────────────────────────────────────────────────
#
#   1. Copy the stream-lazarus service block below into your docker-compose.yml.
#   2. Set ST_HOST to whatever your SillyTavern service is named.
#   3. Make sure stream-lazarus is on the same Docker network as NPM and ST
#      so NPM can reach it by hostname.
#   4. In Nginx Proxy Manager, edit your ST proxy host:
#        Forward Hostname: stream-lazarus
#        Forward Port:     3000
#      Then in the Advanced tab, add:
#        proxy_buffering    off;
#        proxy_read_timeout 300s;
#        proxy_set_header   Connection '';
#   5. docker compose up -d --build
#
# ── Builds directly from GitHub — no local clone needed ───────────────────────
#
#   Docker fetches and builds the proxy automatically on `docker compose up`.
#
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Stream Lazarus Proxy ─────────────────────────────────────────────────────
  # Add this service to your existing docker-compose.yml.
  # It sits between NPM and SillyTavern, keeping the upstream AI connection
  # alive after iOS drops the browser TCP connection mid-generation.
  stream-lazarus:
    container_name: stream-lazarus
    build:
      context: https://github.com/zebede1980/STreamLazarus.git#main:proxy
    environment:
      ST_HOST: sillytavern    # match your SillyTavern service name
      ST_PORT: "8000"
      PROXY_PORT: "3000"
    expose:
      - "3000"
    depends_on:
      - sillytavern
    restart: unless-stopped
    # Ensure this service shares a network with NPM and SillyTavern, e.g.:
    # networks:
    #   - your_shared_network
