<div class="stream-lazarus-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Stream Lazarus</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">

            <!-- Enable / Disable -->
            <div class="flex-container alignitemscenter">
                <label class="checkbox_label" for="sl_enabled">
                    <input type="checkbox" id="sl_enabled" />
                    <span>Enable Stream Lazarus</span>
                </label>
            </div>
            <small class="sl-hint">
                Recovers AI responses when iOS drops the browser connection mid-generation.
            </small>

            <hr />

            <!-- Proxy status -->
            <div class="sl-plugin-section">
                <div class="sl-plugin-header">
                    <i class="fa-solid fa-network-wired"></i>
                    <strong>Proxy Container</strong>
                    <span id="sl_proxy_status" class="sl-plugin-status sl-plugin-missing">Checking&hellip;</span>
                    <button id="sl_proxy_recheck" class="sl-recheck-btn" title="Re-check proxy status">
                        <i class="fa-solid fa-rotate-right"></i>
                    </button>
                </div>
                <small class="sl-hint">
                    The <strong>stream-lazarus</strong> Docker container must be running and Nginx must
                    proxy to it (port&nbsp;3000) instead of directly to SillyTavern.
                    See the project README for the docker-compose snippet.
                </small>
            </div>

        </div>
    </div>
</div>
